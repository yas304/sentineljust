<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0F172A"/>
  
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" stroke="url(#shield-grad)" stroke-width="2" fill="none"/>
  
  <!-- Shield shape -->
  <path d="M32 8 L50 18 L50 38 L32 52 L14 38 L14 18 Z" 
        stroke="url(#shield-grad)" stroke-width="2" fill="url(#shield-grad)" fill-opacity="0.15"/>
  
  <!-- Inner hexagon -->
  <path d="M32 16 L44 24 L44 36 L32 44 L20 36 L20 24 Z" 
        stroke="url(#core-grad)" stroke-width="1.5" fill="none" filter="url(#glow)"/>
  
  <!-- Core circle -->
  <circle cx="32" cy="30" r="8" fill="url(#core-grad)" filter="url(#glow)"/>
  
  <!-- Eye/sentinel detail -->
  <ellipse cx="32" cy="30" rx="4" ry="3" fill="#0F172A"/>
  <circle cx="33" cy="29" r="1.5" fill="#FFFFFF"/>
</svg>
